<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <title>Sin conexión - Asistente IA de Soporte Técnico</title>
    <link rel="shortcut icon" href="/static/images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1976D2;
            --primary-dark: #1565C0;
            --background-light: #F9FAFB;
            --background-dark: #121212;
            --text-light: #1E293B;
            --text-dark: #F8FAFC;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--background-light);
            color: var(--text-light);
            padding: 1rem;
            text-align: center;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background-color: var(--background-dark);
                color: var(--text-dark);
            }
            
            .card {
                background-color: #1F2937 !important;
                border-color: #374151 !important;
            }
            
            .btn-primary {
                background-color: #3B82F6 !important;
            }
            
            .btn-primary:hover {
                background-color: #2563EB !important;
            }
        }
        
        .container {
            max-width: 400px;
            width: 100%;
        }
        
        .card {
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-top: 1rem;
            border: 1px solid #E5E7EB;
        }
        
        .logo {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        p {
            margin-bottom: 1.5rem;
            line-height: 1.5;
            opacity: 0.9;
        }
        
        .btn-primary {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 500;
            margin-top: 1rem;
            transition: background-color 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-dark);
        }
        
        .offline-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #EF4444;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #EF4444;
            margin-right: 0.5rem;
        }
        
        .status-text {
            font-size: 0.875rem;
            opacity: 0.8;
        }
        
        /* Animación para verificar conexión */
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        .checking .status-dot {
            background-color: #F59E0B;
            animation: pulse 1.5s infinite;
        }
        
        .online .status-dot {
            background-color: #10B981;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-robot"></i>
        </div>
        
        <div class="card">
            <div class="offline-icon">
                <i class="fas fa-wifi-slash"></i>
            </div>
            
            <h1>Sin conexión a Internet</h1>
            
            <p>No se puede acceder al asistente en este momento porque no hay conexión a Internet. Comprueba tu conexión y vuelve a intentarlo.</p>
            
            <a href="/" class="btn-primary" id="retry-btn">Reintentar</a>
            
            <div class="status-indicator" id="status-indicator">
                <div class="status-dot"></div>
                <div class="status-text">Desconectado</div>
            </div>
        </div>
    </div>
    
    <script>
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = statusIndicator.querySelector('.status-text');
        const retryBtn = document.getElementById('retry-btn');
        
        // Comprobar conexión periódicamente
        function checkConnection() {
            statusIndicator.classList.add('checking');
            statusText.textContent = 'Verificando conexión...';
            
            // Intentar cargar un recurso pequeño para verificar conexión
            fetch('/health', { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    // Conexión restaurada
                    statusIndicator.classList.remove('checking');
                    statusIndicator.classList.add('online');
                    statusText.textContent = 'Conectado';
                    
                    // Redireccionar automáticamente después de 2 segundos
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                })
                .catch(() => {
                    // Sigue sin conexión
                    statusIndicator.classList.remove('checking');
                    statusText.textContent = 'Desconectado';
                    
                    // Programar próxima verificación
                    setTimeout(checkConnection, 10000);
                });
        }
        
        // Comprobar conexión al cargar la página
        window.addEventListener('load', () => {
            setTimeout(checkConnection, 1000);
        });
        
        // Comprobar conexión al hacer clic en el botón
        retryBtn.addEventListener('click', (e) => {
            e.preventDefault();
            checkConnection();
        });
        
        // Comprobar cuando se restaura la conexión mediante el evento online
        window.addEventListener('online', () => {
            statusIndicator.classList.add('online');
            statusText.textContent = 'Conectado';
            setTimeout(() => {
                window.location.href = '/';
            }, 1000);
        });
    </script>
</body>
</html>
