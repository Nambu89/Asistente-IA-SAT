<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Técnico SVAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            min-height: 100vh;
            /* Prevenir el zoom en inputs en iOS */
            -webkit-text-size-adjust: 100%;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.hidden {
            display: none;
        }
        .user-message {
            background-color: #e3f2fd;
            margin-left: 20%;
            border-radius: 15px 15px 0 15px;
            padding: 1rem;
            color: #1e293b;
            word-break: break-word;
        }
        .bot-message {
            background-color: #f1f5f9;
            margin-right: 20%;
            border-radius: 15px 15px 15px 0;
            padding: 1rem;
            color: #1e293b;
            word-break: break-word;
        }
        .attachment-preview {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f8fafc;
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            max-width: 100%;
            overflow: hidden;
        }
        .file-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }
        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-size {
            font-size: 0.875rem;
            color: #64748b;
        }
        #attachments-preview:not(.hidden) {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .remove-attachment {
            color: #ef4444;
            padding: 0.25rem;
            border-radius: 0.25rem;
            transition: background-color 0.2s;
        }
        .remove-attachment:hover {
            background-color: #fee2e2;
        }
        #camera-preview {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1rem;
        }
        #camera-preview.hidden {
            display: none;
        }
        #camera-view {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            background: #000;
        }
        #photo-canvas {
            display: none;
        }
        @media (max-width: 640px) {
            .user-message {
                margin-left: 10%;
                padding: 0.75rem;
                font-size: 0.95rem;
            }
            .bot-message {
                margin-right: 10%;
                padding: 0.75rem;
                font-size: 0.95rem;
            }
            #chat-messages {
                height: calc(100vh - 180px) !important;
            }
            .max-w-4xl {
                padding: 0.5rem !important;
            }
            #user-input {
                font-size: 1rem;
                padding: 0.5rem;
            }
            #send-button {
                padding: 0.5rem 1rem;
            }
        }
        @media (min-width: 641px) and (max-width: 1024px) {
            .user-message {
                margin-left: 15%;
            }
            .bot-message {
                margin-right: 15%;
            }
            #chat-messages {
                height: calc(100vh - 200px) !important;
            }
        }
        @media (max-width: 640px) {
            #camera-preview {
                padding: 0;
            }
            #camera-view {
                max-height: 80vh;
            }
            .camera-controls {
                padding: 1rem;
                background: rgba(0, 0, 0, 0.5);
            }
            #capture-photo, #retake-photo, #cancel-photo {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
        body.camera-active {
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto p-6">
        <div class="rounded-lg shadow-lg">
            <!-- Encabezado -->
            <div class="bg-blue-600 p-4 rounded-t-lg flex justify-between items-center">
                <h1 class="text-2xl font-bold text-white">Asistente Técnico SVAN</h1>
                <button id="clear-chat" class="text-white hover:text-gray-200" title="Limpiar chat">
                    <i class="fas fa-trash"></i>
                </button>
            </div>

            <!-- Área de mensajes -->
            <div id="chat-messages" class="h-[600px] overflow-y-auto p-4 bg-white"></div>

            <!-- Área de entrada -->
            <div class="border-t p-4 bg-white">
                <div id="attachments-preview" class="hidden"></div>
                <div id="camera-preview" class="hidden">
                    <video id="camera-view" class="w-full rounded-lg mb-2" autoplay playsinline></video>
                    <div class="flex justify-center gap-2 mb-2">
                        <button id="capture-photo" class="bg-blue-600 text-white px-4 py-2 rounded-lg">
                            <i class="fas fa-camera"></i> Capturar
                        </button>
                        <button id="retake-photo" class="bg-gray-600 text-white px-4 py-2 rounded-lg hidden">
                            <i class="fas fa-redo"></i> Repetir
                        </button>
                        <button id="cancel-photo" class="bg-red-600 text-white px-4 py-2 rounded-lg">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                    </div>
                    <canvas id="photo-canvas" class="hidden"></canvas>
                </div>
                <div class="flex gap-2">
                    <button type="button" id="attach-file" class="text-gray-600 hover:text-blue-600" title="Adjuntar archivo">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <button type="button" id="take-photo" class="text-gray-600 hover:text-blue-600" title="Tomar foto">
                        <i class="fas fa-camera"></i>
                    </button>
                    <input type="file" id="file-input" class="hidden" multiple>
                    <textarea id="user-input" rows="1" style="resize: none;" class="flex-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Escribe tu mensaje..."></textarea>
                    <button type="button" id="send-button" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de confirmación -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-md mx-4 p-6">
            <h2 class="text-lg font-bold mb-4">¿Estás seguro?</h2>
            <p class="text-gray-600 mb-4">Esta acción eliminará todo el historial del chat.</p>
            <div class="flex justify-end gap-2">
                <button id="cancel-clear" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancelar</button>
                <button id="confirm-clear" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', path='/js/chat.js') }}"></script>
</body>
</html>
