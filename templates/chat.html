<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Usar un enfoque más suave para evitar bucles de redirección -->
    <script>
        // Redirigir a HTTPS solo si es necesario y no estamos en desarrollo local
        if (window.location.protocol === 'http:' && 
            window.location.hostname !== 'localhost' && 
            window.location.hostname !== '127.0.0.1' &&
            !sessionStorage.getItem('redirectAttempted')) {
            // Marcar que ya intentamos una redirección para evitar bucles
            sessionStorage.setItem('redirectAttempted', 'true');
            window.location.href = window.location.href.replace('http:', 'https:');
        }
    </script>
    <title>Technical Support AI Assistant | Asistente IA de Soporte Técnico</title>
    
    <!-- Favicon e íconos -->
    <link rel="shortcut icon" href="{{ url_for('static', path='/images/favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/images/apple-touch-icon.png') }}">
    
    <!-- CSS y recursos externos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/mobile.css') }}">
    
    <!-- Scripts externos -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    
    <script>
        // Detectar preferencia de tema oscuro del sistema
        if (localStorage.getItem('darkMode') === null) {
            localStorage.setItem('darkMode', window.matchMedia('(prefers-color-scheme: dark)').matches);
        }
        
        // Aplicar tema oscuro si está activado
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }

        // Configurar la URL de la API forzando HTTPS en producción
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            window.API_URL = window.location.protocol + '//' + window.location.host;
        } else {
            // Forzar HTTPS en producción
            window.API_URL = 'https://' + window.location.host;
        }
        console.log("API_URL configurada como:", window.API_URL);
        
        // Deshabilitar la cámara de forma silenciosa
        window.DISABLE_CAMERA = true;
        
        // Función discreta para asegurar que la cámara esté deshabilitada
        function silentlyDisableCamera() {
            // Ocultar el div de la cámara sin notificaciones
            var cameraPreview = document.getElementById('camera-preview');
            if (cameraPreview) {
                cameraPreview.style.display = 'none';
                cameraPreview.classList.add('hidden');
            }
            
            // Detener cualquier stream de video activo sin mensajes
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) {
                        stream.getTracks().forEach(function(track) {
                            track.stop();
                        });
                    })
                    .catch(function() {});
            }
        }
        
        // Ejecutar discretamente al cargar
        window.addEventListener('DOMContentLoaded', silentlyDisableCamera);
    </script>
    
    <style>
        :root {
            --primary-color: #1976D2;
            --primary-color-dark: #1565C0;
            --secondary-color: #E3F2FD;
            --secondary-color-dark: #0D47A1;
            --background-light: #FFFFFF;
            --background-dark: #121212;
            --text-color-light: #1E293B;
            --text-color-dark: #F8FAFC;
            --error-color: #EF4444;
            --success-color: #10B981;
            --border-radius-sm: 0.25rem;
            --border-radius: 0.5rem;
            --border-radius-lg: 1rem;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-light);
            color: var(--text-color-light);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .dark body {
            background-color: var(--background-dark);
            color: var(--text-color-dark);
        }
        
        /* Mejoras en visualización de código */
        pre code {
            border-radius: var(--border-radius);
            padding: 1rem !important;
            overflow-x: auto;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        /* Mejoras para imágenes */
        .manual-image {
            max-height: 300px;
            object-fit: contain;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        
        .manual-image:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }
        
        .dark .manual-image {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        /* Mejoras para el visor de imágenes */
        #image-viewer {
            backdrop-filter: blur(8px);
            transition: opacity 0.3s ease;
        }
        
        #image-viewer-img {
            max-height: 80vh;
            max-width: 90vw;
            object-fit: contain;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: opacity 0.3s ease;
        }
        
        /* Animaciones mejoradas */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-appear {
            animation: fadeInUp 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .fade-out {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Mejoras para la interfaz en dispositivos móviles */
        @media (max-width: 640px) {
            #chat-container {
                border-radius: 0 !important;
                margin: 0 !important;
                height: 100vh !important;
                width: 100% !important;
                max-width: 100% !important;
            }
            
            .user-message, .bot-message {
                padding: 0.75rem !important;
                font-size: 0.95rem !important;
            }
            
            .manual-image {
                max-height: 200px;
            }
            
            .app-header {
                position: sticky;
                top: 0;
                z-index: 10;
            }
            
            .chat-controls {
                position: sticky;
                bottom: 0;
                z-index: 10;
                background-color: inherit;
                padding-bottom: env(safe-area-inset-bottom, 0.5rem);
            }
            
            #image-viewer-img {
                max-width: 95%;
                max-height: 70vh;
            }
        }
        
        /* Mejoras para tablets */
        @media (min-width: 641px) and (max-width: 1024px) {
            .max-w-4xl {
                max-width: 90%;
            }
            
            .image-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Ajustes específicos para iOS */
        @supports (-webkit-touch-callout: none) {
            .chat-controls {
                padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0));
            }
        }
        
        /* Soporte para impresión */
        @media print {
            .chat-controls, .app-header {
                display: none !important;
            }
            
            .chat-messages {
                height: auto !important;
                overflow: visible !important;
            }
            
            .user-message, .bot-message {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100 dark:bg-gray-900">
    <div id="chat-container" class="max-w-4xl mx-auto p-4 h-screen flex flex-col">
        <div class="rounded-lg shadow-lg flex flex-col h-full bg-white dark:bg-gray-800">
            <!-- Encabezado -->
            <div class="app-header bg-blue-600 dark:bg-blue-800 p-3 rounded-t-lg flex justify-between items-center">
                <h1 class="text-xl font-bold text-white">
                    <i class="fas fa-robot mr-2"></i>Asistente IA de Soporte Técnico
                </h1>
                <div class="flex items-center gap-2">
                    <button id="toggle-dark-mode" class="text-white hover:text-gray-200 p-1" title="Cambiar tema">
                        <i id="theme-toggle-icon" class="fas fa-moon"></i>
                    </button>
                    <button id="search-button" class="text-white hover:text-gray-200 p-1" title="Buscar en el chat">
                        <i class="fas fa-search"></i>
                    </button>
                    <button id="clear-chat" class="text-white hover:text-gray-200 p-1" title="Limpiar chat">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <!-- Barra de búsqueda -->
            <div id="search-bar" class="bg-white dark:bg-gray-700 p-2 border-b dark:border-gray-600 hidden">
                <div class="flex items-center gap-2">
                    <input type="text" id="search-input" class="flex-1 p-2 border rounded-lg text-sm dark:bg-gray-800 dark:text-white dark:border-gray-600" placeholder="Buscar en la conversación...">
                    <button id="search-prev" class="text-gray-600 dark:text-gray-300 p-1" disabled>
                        <i class="fas fa-chevron-up"></i>
                    </button>
                    <button id="search-next" class="text-gray-600 dark:text-gray-300 p-1" disabled>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <button id="search-close" class="text-gray-600 dark:text-gray-300 p-1">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="search-stats" class="text-xs text-gray-500 dark:text-gray-400 mt-1 hidden">
                    Resultado <span id="search-current">0</span> de <span id="search-total">0</span>
                </div>
            </div>

            <!-- Área de mensajes -->
            <div id="chat-messages" class="h-[600px] overflow-y-auto p-3 bg-white dark:bg-gray-800 flex-1"></div>

            <!-- Área de entrada -->
            <div class="chat-controls border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
                <div id="attachments-preview" class="hidden px-4 py-2 bg-gray-50 dark:bg-gray-700"></div>
                
                <!-- Previsualización de cámara - DESHABILITADA -->
                <!-- La funcionalidad de cámara ha sido deshabilitada para resolver problemas -->
                <div id="camera-preview" style="display:none !important;" class="hidden"></div>
                
                <!-- Controles de entrada -->
                <div class="flex gap-2 items-center p-3">
                    <div class="action-buttons flex items-center gap-2">
                        <button type="button" id="attach-file" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700" title="Adjuntar archivo">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <!-- Botón de cámara deshabilitado temporalmente
                        <button type="button" id="take-photo" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700" title="Tomar foto">
                            <i class="fas fa-camera"></i>
                        </button>
                        -->
                    </div>
                    <input type="file" id="file-input" class="hidden" multiple accept="image/*,application/pdf,text/plain">
                    <textarea id="user-input" rows="1" style="resize: none;" class="flex-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white dark:border-gray-600" placeholder="Escribe tu mensaje..."></textarea>
                    <button type="button" id="send-button" class="bg-blue-600 hover:bg-blue-700 dark:bg-blue-700 dark:hover:bg-blue-800 text-white rounded-lg p-2 w-10 h-10 flex items-center justify-center">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de confirmación para limpiar chat -->
    <div id="confirm-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center hidden">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md mx-4 p-4">
            <h2 class="text-lg font-bold mb-3 dark:text-white">¿Estás seguro?</h2>
            <p class="text-gray-600 dark:text-gray-300 mb-3">Esta acción eliminará todo el historial del chat.</p>
            <div class="flex justify-end gap-2">
                <button id="cancel-clear" class="px-3 py-2 text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white">Cancelar</button>
                <button id="confirm-clear" class="px-3 py-2 bg-red-600 hover:bg-red-700 text-white rounded">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Visor de imágenes -->
    <div id="image-viewer" class="fixed inset-0 bg-black bg-opacity-75 z-50 items-center justify-center hidden">
        <div class="relative max-w-full max-h-full">
            <img id="image-viewer-img" src="" alt="Imagen ampliada" class="opacity-0 transition-opacity duration-300">
            <div class="absolute top-2 right-2 flex gap-2">
                <button id="image-viewer-download" class="bg-blue-600 text-white p-2 rounded-full opacity-80 hover:opacity-100">
                    <i class="fas fa-download"></i>
                </button>
                <button id="image-viewer-close" class="bg-red-600 text-white p-2 rounded-full opacity-80 hover:opacity-100">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="image-viewer-caption" class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-60 text-white p-2 text-center"></div>
        </div>
    </div>

    <!-- Plantilla para mensajes -->
    <template id="bot-message-template">
        <div class="bot-message p-4">
            <div class="message-content"></div>
            <div class="message-feedback mt-2 flex items-center justify-end gap-2 text-gray-400">
                <button class="feedback-button thumbs-up hover:text-green-500 transition-colors duration-200" title="Respuesta útil">
                    <i class="fas fa-thumbs-up"></i>
                </button>
                <button class="feedback-button thumbs-down hover:text-red-500 transition-colors duration-200" title="Respuesta no útil">
                    <i class="fas fa-thumbs-down"></i>
                </button>
            </div>
            <div class="feedback-form hidden mt-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-md">
                <textarea placeholder="Cuéntanos más sobre tu experiencia (opcional)" class="feedback-comment w-full p-2 border rounded-md text-sm dark:bg-gray-800 dark:text-white dark:border-gray-600"></textarea>
                <div class="flex justify-end mt-2">
                    <button class="feedback-cancel px-2 py-1 text-sm text-gray-600 dark:text-gray-300 mr-2">Cancelar</button>
                    <button class="feedback-submit px-2 py-1 text-sm bg-blue-600 hover:bg-blue-700 dark:bg-blue-700 dark:hover:bg-blue-800 text-white rounded-md">Enviar</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Notificaciones y mensajes emergentes -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Diseño de mensajes de estado de conexión -->
    <template id="connection-status-template">
        <div class="connection-status p-2 rounded-lg shadow-lg flex items-center transition-opacity duration-300">
            <div class="status-icon mr-2"></div>
            <div class="status-message"></div>
        </div>
    </template>

    <!-- Service Worker y capacidades offline -->
    <script>
        // Registrar Service Worker para funcionamiento offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/js/sw.js').then(
                    registration => {
                        console.log('ServiceWorker registrado correctamente:', registration.scope);
                    },
                    error => {
                        console.error('Error al registrar ServiceWorker:', error);
                    }
                );
            });
        }

        // Función para mostrar notificaciones toast
        function showToast(message, type = 'info', duration = 3000) {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Configurar clases según el tipo
            const baseClasses = 'p-3 rounded-lg shadow-lg flex items-center max-w-xs';
            let typeClasses = '';
            let icon = '';
            
            switch (type) {
                case 'success':
                    typeClasses = 'bg-green-500 text-white';
                    icon = '<i class="fas fa-check-circle mr-2"></i>';
                    break;
                case 'error':
                    typeClasses = 'bg-red-500 text-white';
                    icon = '<i class="fas fa-exclamation-circle mr-2"></i>';
                    break;
                case 'warning':
                    typeClasses = 'bg-yellow-500 text-white';
                    icon = '<i class="fas fa-exclamation-triangle mr-2"></i>';
                    break;
                default:
                    typeClasses = 'bg-blue-500 text-white';
                    icon = '<i class="fas fa-info-circle mr-2"></i>';
            }
            
            toast.className = `${baseClasses} ${typeClasses} animate-fade-in`;
            toast.innerHTML = `${icon}${message}`;
            
            // Añadir al contenedor
            toastContainer.appendChild(toast);
            
            // Animar y eliminar después del tiempo especificado
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, duration);
        }

        // Detección de conexión a internet
        window.addEventListener('online', () => {
            showToast('Conexión a internet restablecida', 'success');
        });
        
        window.addEventListener('offline', () => {
            showToast('Se ha perdido la conexión a internet', 'warning', 5000);
        });
    </script>

    <!-- Script principal -->
    <script src="{{ url_for('static', path='/js/chat.js') }}"></script>
</body>
</html>
