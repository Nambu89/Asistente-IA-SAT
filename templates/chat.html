<!DOCTYPE html>
<html>
<head>
    <title>Asistente Técnico SVAN</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- Añadir marked.js para procesar markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen p-6">
        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg">
            <div class="p-4 border-b bg-blue-600 rounded-t-lg">
                <h1 class="text-2xl font-bold text-white">Asistente Técnico SVAN</h1>
            </div>
            <div id="chat-messages" class="h-[600px] overflow-y-auto p-4"></div>
            <div class="p-4 border-t">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" 
                           id="user-input" 
                           class="flex-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="Describe el problema técnico...">
                    <button type="submit" 
                            class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                        Enviar
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="/static/js/chat.js"></script>
</body>
</html>
